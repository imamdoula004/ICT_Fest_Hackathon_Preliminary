<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <style>
    @keyframes checkFlow {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; }
      40% { transform: translate(260px, 0); }
      70% { transform: translate(460px, 0); }
      90% { opacity: 1; }
      100% { transform: translate(460px, 0); opacity: 0; }
    }
    .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #ffffff; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #60a5fa; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 6; }
    .status-err { fill: #ef4444; rx: 4; }
    .status-ok { fill: #10b981; rx: 4; }
    .packet { fill: #3b82f6; rx: 4; }
  </style>
  <rect width="100%" height="100%" fill="#0b0f19" rx="8" />
  
  <text x="30" y="35" class="title">Token Revocation Check (sub vs jti)</text>

  <!-- Left: Buggy (Checking sub) -->
  <g transform="translate(40, 50)">
    <rect x="0" y="20" width="120" height="50" class="box" />
    <text x="60" y="50" class="text" text-anchor="middle">JTI Blacklist</text>

    <rect x="220" y="20" width="120" height="50" class="box" stroke="#ef4444" />
    <text x="280" y="50" class="text" text-anchor="middle" fill="#f87171">Checks user sub</text>

    <rect x="440" y="20" width="120" height="50" class="status-err" />
    <text x="500" y="50" class="text" text-anchor="middle" font-weight="bold">Bypassed (401 Missing)</text>

    <!-- Animated Packet -->
    <g style="animation: checkFlow 4s infinite ease-in-out;">
      <rect x="10" y="32" width="80" height="24" class="packet" />
      <text x="50" y="48" class="text" font-size="10" text-anchor="middle">JTI: abc12</text>
    </g>
  </g>
</svg>
