<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%">
  <style>
    @keyframes digitChange {
      0% { content: "502.5"; }
      50% { content: "503"; }
      100% { content: "503"; }
    }
    .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #ffffff; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #60a5fa; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 6; }
    .err-text { fill: #f87171; }
    .ok-text { fill: #34d399; }
  </style>
  <rect width="100%" height="100%" fill="#0b0f19" rx="8" />
  
  <text x="30" y="35" class="title">Half-Cent Rounding-Up (e.g. 50% of 1005 Cents)</text>

  <g transform="translate(40, 50)">
    <!-- Buggy Float Math -->
    <rect x="0" y="20" width="320" height="70" class="box" stroke="#ef4444" />
    <text x="20" y="45" class="text" font-weight="bold">Buggy Float Rounding (Banker's/Truncate)</text>
    <text x="20" y="65" class="text err-text" font-size="16" font-weight="bold">1005 * 0.5 = 502.5 → 502 cents</text>

    <!-- Correct Integer Rounding -->
    <rect x="360" y="20" width="320" height="70" class="box" stroke="#10b981" />
    <text x="380" y="45" class="text" font-weight="bold">Correct Integer Rounding-Up</text>
    <text x="380" y="65" class="text ok-text" font-size="16" font-weight="bold">(1005 + 1) // 2 = 503 cents</text>
  </g>
</svg>
