<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <style>
    @keyframes reuseCheck {
      0% { transform: translate(0, 0); opacity: 1; }
      40% { transform: translate(250px, 0); }
      70% { transform: translate(450px, 0); }
      100% { transform: translate(450px, 0); opacity: 0; }
    }
    .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #ffffff; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #60a5fa; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 6; }
    .packet { fill: #ec4899; rx: 4; }
  </style>
  <rect width="100%" height="100%" fill="#0b0f19" rx="8" />
  
  <text x="30" y="35" class="title">Refresh Token Rotation (Single-Use Validation)</text>

  <g transform="translate(40, 50)">
    <!-- Lock Check -->
    <rect x="230" y="20" width="140" height="60" class="box" stroke="#f59e0b" />
    <text x="300" y="45" class="text" text-anchor="middle" font-weight="bold">Check &amp; Revoke</text>
    <text x="300" y="65" class="text" text-anchor="middle" font-size="10" fill="#9ca3af">Atomic Transaction</text>

    <!-- Output -->
    <rect x="470" y="20" width="140" height="60" class="box" stroke="#ef4444" fill="#dc2626" />
    <text x="540" y="55" class="text" text-anchor="middle" font-weight="bold">401 Unauthorized</text>

    <!-- Animated Reuse Packet -->
    <g style="animation: reuseCheck 4s infinite ease-in-out;">
      <rect x="10" y="32" width="100" height="30" class="packet" />
      <text x="60" y="51" class="text" font-size="10" text-anchor="middle" font-weight="bold">Re-used JTI: 123</text>
    </g>
  </g>
</svg>
