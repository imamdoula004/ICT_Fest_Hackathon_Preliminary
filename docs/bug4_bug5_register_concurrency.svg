<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <style>
    @keyframes thread1 {
      0% { transform: translate(0, 0); opacity: 1; }
      50% { transform: translate(250px, 0); }
      100% { transform: translate(250px, 0); }
    }
    @keyframes thread2 {
      0% { transform: translate(0, 0); opacity: 1; }
      50% { transform: translate(250px, 0); }
      100% { transform: translate(250px, 0); }
    }
    .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #ffffff; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #60a5fa; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 6; }
  </style>
  <rect width="100%" height="100%" fill="#0b0f19" rx="8" />
  
  <text x="30" y="35" class="title">Registration Concurrency &amp; Rollback (409 USERNAME_TAKEN)</text>

  <g transform="translate(40, 50)">
    <!-- Main DB check stage -->
    <rect x="250" y="20" width="160" height="80" class="box" stroke="#10b981" />
    <text x="330" y="55" class="text" text-anchor="middle" font-weight="bold">Database Commit</text>
    <text x="330" y="75" class="text" text-anchor="middle" font-size="11" fill="#9ca3af">Unique Constraint</text>

    <!-- Thread 1 -->
    <g style="animation: thread1 4s infinite ease-in-out;">
      <circle cx="50" cy="40" r="12" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
      <text x="50" y="65" class="text" font-size="10" text-anchor="middle">T1 (Success: 201)</text>
    </g>

    <!-- Thread 2 -->
    <g style="animation: thread2 4s infinite ease-in-out;">
      <circle cx="50" cy="110" r="12" fill="#ef4444" stroke="#dc2626" stroke-width="2" />
      <text x="50" y="135" class="text" font-size="10" text-anchor="middle">T2 (Rollback -> 409)</text>
    </g>
  </g>
</svg>
