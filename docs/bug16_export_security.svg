<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <style>
    @keyframes requestFlow {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; }
      50% { transform: translate(250px, 0); }
      90% { opacity: 1; }
      100% { transform: translate(250px, 0); opacity: 0; }
    }
    .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #ffffff; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #60a5fa; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 6; }
    .block-box { fill: #ef4444; rx: 4; }
  </style>
  <rect width="100%" height="100%" fill="#0b0f19" rx="8" />
  
  <text x="30" y="35" class="title">Export Multi-Tenancy Security Filter</text>

  <g transform="translate(40, 50)">
    <!-- Checker -->
    <rect x="250" y="20" width="160" height="70" class="box" stroke="#f59e0b" />
    <text x="330" y="45" class="text" text-anchor="middle" font-weight="bold">Ownership Validation</text>
    <text x="330" y="65" class="text" text-anchor="middle" font-size="10" fill="#9ca3af">Room Org == Admin Org?</text>

    <!-- Animated Packet (Admin A requesting Room B) -->
    <g style="animation: requestFlow 4s infinite ease-in-out;">
      <rect x="10" y="30" width="130" height="45" class="block-box" />
      <text x="75" y="48" class="text" font-size="10" text-anchor="middle" font-weight="bold">Admin A → Room B</text>
      <text x="75" y="65" class="text" font-size="9" text-anchor="middle" fill="#fee2e2">404 ROOM NOT FOUND</text>
    </g>
  </g>
</svg>
